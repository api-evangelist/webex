aid: webex
name: Webex
description: Cisco Webex is a comprehensive collaboration platform offering APIs for messaging, meetings,
  calling, devices, and contact center workflows. The Webex Developer Platform enables developers to build
  integrations, bots, embedded apps, and automations using REST APIs, SDKs, and webhooks. Webex supports
  OAuth 2.0 authentication and provides separate API surfaces for messaging, video conferencing, cloud
  calling, admin management, and more.
type: Index
position: Consumer
access: 3rd-Party
image: https://developer.webex.com/images/webex-logo.png
tags:
  - Calling
  - Collaboration
  - Communication
  - Enterprise
  - Messaging
  - Video Conferencing
url: https://raw.githubusercontent.com/api-evangelist/webex/refs/heads/main/apis.yml
created: '2025-02-06'
modified: '2026-05-04'
specificationVersion: '0.19'
apis:
  - aid: webex:messaging
    name: Webex Messaging
    description: Webex Messaging API for creating and managing rooms, messages, attachments, teams, memberships,
      and real-time collaboration. Supports text, markdown, file sharing, and webhook event subscriptions.
    humanURL: https://developer.webex.com/docs/messaging
    tags:
      - Bots
      - Collaboration
      - Messaging
      - Rooms
      - Teams
      - Webhooks
    properties:
      - type: Documentation
        url: https://developer.webex.com/docs/messaging
      - type: OpenAPI
        url: openapi/webex-messaging-openapi.json
  - aid: webex:meetings
    name: Webex Meetings
    description: Webex Meetings API for scheduling, managing, and reporting on video meetings. Provides
      endpoints for meeting lifecycle management, invitees, participants, recordings, transcripts, and
      meeting templates.
    humanURL: https://developer.webex.com/docs/meetings
    tags:
      - Meetings
      - Recordings
      - Scheduling
      - Video Conferencing
    properties:
      - type: Documentation
        url: https://developer.webex.com/docs/meetings
      - type: OpenAPI
        url: openapi/webex-meeting-openapi.json
  - aid: webex:admin
    name: Webex Admin
    description: Webex Admin API for managing organizations, users, licenses, locations, workspaces, devices,
      and organization settings. Provides administrative control over Webex deployments including PSTN
      settings and call policies.
    humanURL: https://developer.webex.com/docs/admin
    tags:
      - Administration
      - Devices
      - Licenses
      - Organizations
      - Users
    properties:
      - type: Documentation
        url: https://developer.webex.com/docs/admin
      - type: OpenAPI
        url: openapi/webex-admin-openapi.json
  - aid: webex:cloud-calling
    name: Webex Cloud Calling
    description: Webex Cloud Calling API with 633 endpoints for managing users, locations, call settings,
      hunt groups, auto-attendants, voicemail, call queues, and PSTN configurations for cloud-based telephony.
    humanURL: https://developer.webex.com/docs/cloud-calling
    tags:
      - Auto Attendant
      - Call Management
      - Calling
      - Cloud Telephony
      - PSTN
      - Voicemail
    properties:
      - type: Documentation
        url: https://developer.webex.com/docs/cloud-calling
      - type: OpenAPI
        url: openapi/webex-cloud-calling-openapi.json
  - aid: webex:contact-center
    name: Webex Contact Center
    description: Webex Contact Center API for managing customer service operations including agents, queues,
      routing strategies, skills, and reporting. Enables programmatic control of contact center configurations
      and workflows.
    humanURL: https://developer.webex.com/docs/contact-center
    tags:
      - Agents
      - Contact Center
      - Customer Service
      - Queues
      - Routing
    properties:
      - type: Documentation
        url: https://developer.webex.com/docs/contact-center
      - type: OpenAPI
        url: openapi/webex-contact-center-openapi.json
  - aid: webex:devices
    name: Webex Devices
    description: Webex Device API for managing Webex hardware devices, workspaces, and device configurations.
      Includes endpoints for device inventory, activation, workspace assignments, and device-specific
      settings.
    humanURL: https://developer.webex.com/docs/devices
    tags:
      - Devices
      - Hardware
      - Workspaces
    properties:
      - type: Documentation
        url: https://developer.webex.com/docs/devices
      - type: OpenAPI
        url: openapi/webex-device-openapi.json
  - aid: webex:broadworks
    name: Webex Broadworks Calling
    description: Webex Broadworks Calling API for managing BroadWorks subscriber provisioning and migration
      to Webex. Enables service providers to integrate BroadWorks telephony infrastructure with Webex
      cloud services.
    humanURL: https://developer.webex.com/docs/broadworks
    tags:
      - BroadWorks
      - Calling
      - Service Provider
      - Telephony
    properties:
      - type: Documentation
        url: https://developer.webex.com/docs/broadworks
      - type: OpenAPI
        url: openapi/webex-broadworks-openapi.json
  - aid: webex:ucm
    name: Webex for UCM
    description: Webex for Unified CM (UCM) API for managing on-premises Cisco Unified Communications
      Manager integration with Webex cloud services. Supports hybrid calling configurations.
    humanURL: https://developer.webex.com/docs/ucm
    tags:
      - Calling
      - On-Premises
      - Unified CM
    properties:
      - type: Documentation
        url: https://developer.webex.com/docs/ucm
      - type: OpenAPI
        url: openapi/webex-ucm-openapi.json
  - aid: webex:wholesale
    name: Webex Wholesale
    description: Webex Wholesale API for service provider partners to provision and manage Webex Wholesale
      (RTM) customers and subscriptions at scale. Enables white-label Webex deployment workflows.
    humanURL: https://developer.webex.com/docs/wholesale
    tags:
      - Partner
      - Provisioning
      - Service Provider
      - Wholesale
    properties:
      - type: Documentation
        url: https://developer.webex.com/docs/wholesale
      - type: OpenAPI
        url: openapi/webex-wholesale-openapi.json
