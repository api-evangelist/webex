naftiko: "1.0.0-alpha1"

info:
  label: "Webex Meetings"
  description: >-
    Webex Meetings API for scheduling, managing, and retrieving information
    about Webex meetings, meeting participants, recordings, and transcripts.
  tags:
    - Webex
    - Meetings
    - Scheduling
    - Video Conferencing
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WEBEX_ACCESS_TOKEN: WEBEX_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: webex-meetings
      baseUri: https://webexapis.com/v1
      description: "Webex Meetings REST API for scheduling, managing, and reporting on meetings."
      authentication:
        type: bearer
        token: "{{WEBEX_ACCESS_TOKEN}}"
      resources:
        - name: meetings
          path: /meetings
          description: "Webex meetings for scheduling and managing video conferences."
          operations:
            - name: list-meetings
              method: GET
              description: "List Meetings"
              inputParameters:
                - name: meetingType
                  in: query
                  type: string
                  required: false
                  description: "Scheduled meeting, personal room meeting, or webinar."
                - name: state
                  in: query
                  type: string
                  required: false
                  description: "Active, scheduled, ready, lobby, in-progress, ended, missed, or expired."
                - name: max
                  in: query
                  type: integer
                  required: false
                  description: "Limit the number of meetings in the response."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-meeting
              method: POST
              description: "Create a Meeting"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  title: "{{tools.title}}"
                  start: "{{tools.start}}"
                  end: "{{tools.end}}"
                  invitees: "{{tools.invitees}}"
            - name: get-meeting
              method: GET
              description: "Get Meeting Details"
              inputParameters:
                - name: meetingId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier for the meeting."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-meeting
              method: PUT
              description: "Update a Meeting"
              inputParameters:
                - name: meetingId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier for the meeting."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  title: "{{tools.title}}"
                  start: "{{tools.start}}"
                  end: "{{tools.end}}"
            - name: delete-meeting
              method: DELETE
              description: "Delete a Meeting"
              inputParameters:
                - name: meetingId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier for the meeting."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: meeting-participants
          path: /meetingParticipants
          description: "Participants who joined Webex meetings."
          operations:
            - name: list-participants
              method: GET
              description: "List Meeting Participants"
              inputParameters:
                - name: meetingId
                  in: query
                  type: string
                  required: true
                  description: "The unique identifier for the meeting."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: meeting-invitees
          path: /meetingInvitees
          description: "People invited to Webex meetings."
          operations:
            - name: list-invitees
              method: GET
              description: "List Meeting Invitees"
              inputParameters:
                - name: meetingId
                  in: query
                  type: string
                  required: true
                  description: "The unique identifier for the meeting."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-invitee
              method: POST
              description: "Invite Someone to a Meeting"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  meetingId: "{{tools.meetingId}}"
                  email: "{{tools.email}}"

        - name: meeting-recordings
          path: /recordings
          description: "Webex meeting recordings."
          operations:
            - name: list-recordings
              method: GET
              description: "List Recordings"
              inputParameters:
                - name: meetingId
                  in: query
                  type: string
                  required: false
                  description: "The unique identifier for the meeting."
                - name: max
                  in: query
                  type: integer
                  required: false
                  description: "Limit the number of recordings in the response."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-recording
              method: GET
              description: "Get Recording Details"
              inputParameters:
                - name: recordingId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier for the recording."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: webex-meetings-api
      resources:
        - path: /v1/meetings
          name: meetings
          description: "Webex meetings scheduling and management"
          operations:
            - method: GET
              name: list-meetings
              description: "List scheduled Webex meetings"
              call: "webex-meetings.list-meetings"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-meeting
              description: "Schedule a new Webex meeting"
              call: "webex-meetings.create-meeting"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/recordings
          name: recordings
          description: "Webex meeting recordings"
          operations:
            - method: GET
              name: list-recordings
              description: "List Webex recordings"
              call: "webex-meetings.list-recordings"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: webex-meetings-mcp
      transport: http
      tools:
        - name: list-meetings
          description: "List scheduled Webex meetings"
          hints:
            readOnly: true
            openWorld: true
          call: "webex-meetings.list-meetings"
          outputParameters:
            - type: object
              mapping: "$."
        - name: schedule-meeting
          description: "Schedule a new Webex video meeting"
          hints:
            readOnly: false
            destructive: false
          call: "webex-meetings.create-meeting"
          with:
            title: "tools.title"
            start: "tools.start"
            end: "tools.end"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-meeting
          description: "Get details of a specific Webex meeting"
          hints:
            readOnly: true
            openWorld: false
          call: "webex-meetings.get-meeting"
          with:
            meetingId: "tools.meetingId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-participants
          description: "List participants in a Webex meeting"
          hints:
            readOnly: true
            openWorld: false
          call: "webex-meetings.list-participants"
          with:
            meetingId: "tools.meetingId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-recordings
          description: "List Webex meeting recordings"
          hints:
            readOnly: true
            openWorld: true
          call: "webex-meetings.list-recordings"
          outputParameters:
            - type: object
              mapping: "$."
