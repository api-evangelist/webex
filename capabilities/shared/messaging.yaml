naftiko: "1.0.0-alpha1"

info:
  label: "Webex Messaging"
  description: >-
    Webex Messaging API for creating and managing rooms, messages, attachments,
    teams, memberships, and real-time collaboration via the Webex platform.
  tags:
    - Webex
    - Messaging
    - Collaboration
    - Rooms
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WEBEX_ACCESS_TOKEN: WEBEX_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: webex-messaging
      baseUri: https://webexapis.com/v1
      description: "Webex Messaging REST API for rooms, messages, teams, and memberships."
      authentication:
        type: bearer
        token: "{{WEBEX_ACCESS_TOKEN}}"
      resources:
        - name: rooms
          path: /rooms
          description: "Cisco Webex rooms (formerly known as spaces) are virtual meeting places where people post messages and collaborate."
          operations:
            - name: list-rooms
              method: GET
              description: "List Rooms"
              inputParameters:
                - name: teamId
                  in: query
                  type: string
                  required: false
                  description: "List rooms associated with a team."
                - name: type
                  in: query
                  type: string
                  required: false
                  description: "direct or group. Group rooms are conversations between two or more people."
                - name: max
                  in: query
                  type: integer
                  required: false
                  description: "Limit the maximum number of rooms in the response."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-room
              method: POST
              description: "Create a Room"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  title: "{{tools.title}}"
                  teamId: "{{tools.teamId}}"
            - name: get-room
              method: GET
              description: "Get Room Details"
              inputParameters:
                - name: roomId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier for the room."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-room
              method: PUT
              description: "Update a Room"
              inputParameters:
                - name: roomId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier for the room."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  title: "{{tools.title}}"
            - name: delete-room
              method: DELETE
              description: "Delete a Room"
              inputParameters:
                - name: roomId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier for the room."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: messages
          path: /messages
          description: "Messages are how you communicate in a room. In Webex, each message is displayed on its own line along with a timestamp and sender information."
          operations:
            - name: list-messages
              method: GET
              description: "List Messages"
              inputParameters:
                - name: roomId
                  in: query
                  type: string
                  required: true
                  description: "List messages in a room, by ID."
                - name: max
                  in: query
                  type: integer
                  required: false
                  description: "Limit the maximum number of messages in the response."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-message
              method: POST
              description: "Create a Message"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  roomId: "{{tools.roomId}}"
                  text: "{{tools.text}}"
                  markdown: "{{tools.markdown}}"
            - name: get-message
              method: GET
              description: "Get Message Details"
              inputParameters:
                - name: messageId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier for the message."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-message
              method: DELETE
              description: "Delete a Message"
              inputParameters:
                - name: messageId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier for the message."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: teams
          path: /teams
          description: "Teams are groups of people with a set of rooms that are visible to all members."
          operations:
            - name: list-teams
              method: GET
              description: "List Teams"
              inputParameters:
                - name: max
                  in: query
                  type: integer
                  required: false
                  description: "Limit the maximum number of teams in the response."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-team
              method: POST
              description: "Create a Team"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
            - name: get-team
              method: GET
              description: "Get Team Details"
              inputParameters:
                - name: teamId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier for the team."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: people
          path: /people
          description: "People are registered users of Webex. Searching and viewing People requires an auth token."
          operations:
            - name: list-people
              method: GET
              description: "List People"
              inputParameters:
                - name: email
                  in: query
                  type: string
                  required: false
                  description: "List people with this email address."
                - name: displayName
                  in: query
                  type: string
                  required: false
                  description: "List people whose name starts with the provided string."
                - name: max
                  in: query
                  type: integer
                  required: false
                  description: "Limit the number of people in the response."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-person
              method: GET
              description: "Get Person Details"
              inputParameters:
                - name: personId
                  in: path
                  type: string
                  required: true
                  description: "A unique identifier for the person."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: webhooks
          path: /webhooks
          description: "Webhooks allow your app to be notified via HTTP when a specific event occurs in Webex."
          operations:
            - name: list-webhooks
              method: GET
              description: "List Webhooks"
              inputParameters:
                - name: max
                  in: query
                  type: integer
                  required: false
                  description: "Limit the number of webhooks in the response."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-webhook
              method: POST
              description: "Create a Webhook"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  targetUrl: "{{tools.targetUrl}}"
                  resource: "{{tools.resource}}"
                  event: "{{tools.event}}"
            - name: delete-webhook
              method: DELETE
              description: "Delete a Webhook"
              inputParameters:
                - name: webhookId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier for the webhook."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: webex-messaging-api
      resources:
        - path: /v1/rooms
          name: rooms
          description: "Webex rooms management"
          operations:
            - method: GET
              name: list-rooms
              description: "List all Webex rooms"
              call: "webex-messaging.list-rooms"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-room
              description: "Create a new Webex room"
              call: "webex-messaging.create-room"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/rooms/{roomId}
          name: room
          description: "Single Webex room operations"
          operations:
            - method: GET
              name: get-room
              description: "Get a Webex room by ID"
              call: "webex-messaging.get-room"
              with:
                roomId: "rest.roomId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-room
              description: "Delete a Webex room"
              call: "webex-messaging.delete-room"
              with:
                roomId: "rest.roomId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/messages
          name: messages
          description: "Webex messages"
          operations:
            - method: GET
              name: list-messages
              description: "List messages in a room"
              call: "webex-messaging.list-messages"
              with:
                roomId: "rest.roomId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-message
              description: "Post a message to a room"
              call: "webex-messaging.create-message"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: webex-messaging-mcp
      transport: http
      tools:
        - name: list-rooms
          description: "List Webex collaboration rooms"
          hints:
            readOnly: true
            openWorld: true
          call: "webex-messaging.list-rooms"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-room
          description: "Create a new Webex room"
          hints:
            readOnly: false
            destructive: false
          call: "webex-messaging.create-room"
          with:
            title: "tools.title"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-messages
          description: "List messages in a Webex room"
          hints:
            readOnly: true
            openWorld: true
          call: "webex-messaging.list-messages"
          with:
            roomId: "tools.roomId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: send-message
          description: "Send a message to a Webex room"
          hints:
            readOnly: false
            destructive: false
          call: "webex-messaging.create-message"
          with:
            roomId: "tools.roomId"
            text: "tools.text"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-people
          description: "Search Webex users by email or display name"
          hints:
            readOnly: true
            openWorld: true
          call: "webex-messaging.list-people"
          with:
            email: "tools.email"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-webhooks
          description: "List registered Webex webhooks"
          hints:
            readOnly: true
            openWorld: false
          call: "webex-messaging.list-webhooks"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-webhook
          description: "Create a Webex webhook for event notifications"
          hints:
            readOnly: false
            destructive: false
          call: "webex-messaging.create-webhook"
          with:
            name: "tools.name"
            targetUrl: "tools.targetUrl"
            resource: "tools.resource"
            event: "tools.event"
          outputParameters:
            - type: object
              mapping: "$."
