meters:
  - name: compute_hours
    unit: instance-hour
    aggregation: sum
    dimensions:
      - service
      - region
      - instance_type
      - tenant
  - name: storage
    unit: GB-month
    aggregation: max
    dimensions:
      - service
      - tier
  - name: data_transfer
    unit: GB
    aggregation: sum
    dimensions:
      - egress_type
      - region_pair
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - service
      - operation
  - name: managed_services
    unit: varies
    aggregation: sum
    dimensions:
      - service
principles:
  - name: Visibility
    description: Track Cisco Webex consumption monthly.
  - name: Allocation
    description: Tag usage to teams/cost centers for chargeback.
  - name: Optimization
    description: Right-size; reclaim unused entitlements.
  - name: Accountability
    description: Set spend alerts; quarterly review.
